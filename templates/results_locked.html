{% extends "base.html" %}

{% block title %}Results locked • Voting System{% endblock %}

{% block content %}
  <section class="card" style="margin-top: 20px;">
    <div class="card__header">
      <h1 class="h1">Results are locked</h1>
      <p class="subtle">
        This page requires a PIN. Ask the admin for access.
      </p>
    </div>

    <div class="stack stack--md">
      <div class="muted">
        If you have the PIN, open:
        <code>/results?pin=YOUR_PIN</code>
      </div>

      <div class="actions">
        <a class="btn btn--primary" href="{{ url_for('index') }}">Back</a>
      </div>
    </div>
  </section>
{% endblock %}
